server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Laufzeit-Config nie cachen — wird pro Container-Start neu generiert.
  location = /config.js {
    add_header Cache-Control "no-store";
  }

  # SPA: alle nicht-Datei-Routen auf index.html (Client-Side-Routing).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
