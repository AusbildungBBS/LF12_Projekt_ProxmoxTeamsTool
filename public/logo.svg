<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VM Provisioning logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b5fc7"/>
      <stop offset="55%" stop-color="#8a5cc0"/>
      <stop offset="100%" stop-color="#e8770a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- App badge -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)"/>

  <!-- Speech bubble (chat / Teams side) -->
  <g filter="url(#shadow)">
    <path d="M70 66 h116 a22 22 0 0 1 22 22 v66 a22 22 0 0 1 -22 22 h-62 l-30 26 v-26 h-24 a22 22 0 0 1 -22 -22 v-66 a22 22 0 0 1 22 -22 z"
          fill="#ffffff"/>
  </g>

  <!-- Server / VM stack inside the bubble (Proxmox side) -->
  <g fill="none" stroke="#5b5fc7" stroke-width="9" stroke-linecap="round">
    <rect x="86" y="92"  width="84" height="20" rx="6" fill="#eef0fb" stroke="#5b5fc7"/>
    <rect x="86" y="121" width="84" height="20" rx="6" fill="#fbeede" stroke="#e8770a"/>
  </g>
  <!-- status LEDs -->
  <circle cx="100" cy="102" r="4.5" fill="#3fb950"/>
  <circle cx="100" cy="131" r="4.5" fill="#e8770a"/>
</svg>
