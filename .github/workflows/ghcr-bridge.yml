# Baut das Bridge-Image (linux/amd64) und pusht es in die GitHub Container
# Registry (GHCR). Die Backend-VM kann dann pullen statt selbst zu builden:
#   BRIDGE_IMAGE=ghcr.io/ausbildungbbs/lf12_projekt_proxmoxteamstool/bridge:latest
# in der .env setzen, dann `docker compose ... pull bridge && ... up -d`
# (ohne --build). Siehe README -> Docker bzw. docs/deployment.md Schritt 3.
#
# Auth laeuft komplett ueber das automatische GITHUB_TOKEN (permissions:
# packages: write) — KEIN PAT/Secret noetig. Einmalig manuell: das Package
# nach dem ersten Push auf "public" stellen (Package -> Package settings ->
# Change visibility), sonst braucht die VM ein `docker login ghcr.io`.
#
# Tags pro Push auf main: `latest`, `main`, `sha-<commit>`; bei einem
# Git-Tag `vX.Y.Z` zusaetzlich `X.Y.Z`.

name: Bridge-Image (GHCR)

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  # metadata-action lowercased den Repo-Namen automatisch (GHCR-Pflicht).
  IMAGE: ghcr.io/${{ github.repository }}/bridge

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    name: Build and Push
    steps:
      - uses: actions/checkout@v4

      # Buildx fuer --cache-to/--cache-from (GitHub-Actions-Cache, beschleunigt
      # die npm-ci-Layer deutlich).
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags + OCI-Labels ableiten
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # org.opencontainers.image.source wird automatisch gesetzt -> das
          # Package wird in GitHub mit diesem Repo verknuepft.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build + Push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bridge/Dockerfile
          # x64 reicht fuer die Proxmox-VM. Fuer arm64 zusaetzlich
          # docker/setup-qemu-action davor + "linux/arm64" hier ergaenzen.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Plain-Manifest statt OCI-Index (Provenance-Attestation) — haelt
          # `docker pull` auf aelteren Docker-Versionen der VM unkompliziert.
          provenance: false
